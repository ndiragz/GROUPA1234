<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../static/css/main.css">

    <style>
        form{
            border: 2px solid black;
            width: 800px;
            height: 400px;
            display: block;
            margin: 20px auto;
            background-color: chocolate;
            border-radius: 20px;

        }
        h4{
            text-align: center;
            font-size: 30px;
            font-family: cursive;
            font-weight: bolder;
            text-decoration: underline;
            color: bisque;
        }
        input{
            /*margin-top: 20px;*/
            background-color: wheat;
            color: black;
            display: block;
            margin: auto;
            width: 75%;
        }
        body{
            background-image: url("../../media/students/evgenit-night-sky-6245049_1920.jpg");
        }
        button{
            width: 250px;
            /*margin-top: 20px;*/
            margin: 20px auto;
            display: block;
            text-align: center;
            background-color: green;
        }
        button:hover{
            background-color: yellow;
            color: black;
        }
    </style>

</head>
<body>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissable fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}
<h4>Create Account</h4>
<form action="" method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="mt-5"><br>
    <input type="email" name="email" placeholder="Email"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Sign Up</button>
    <p>Already have an Account?
        <a href="{% url 'login' %}">Login Here</a>
    </p>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
