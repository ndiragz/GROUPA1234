<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<style>
    body{background-image: url("../../media/students/yuri_b-flower-3175428_1920.jpg")}
     form{
            border: 2px solid black;
            width: 800px;
            height: 400px;
            display: block;
            margin: 20px auto;
            background-color: deepskyblue;
            border-radius: 20px;}
     h4{
            text-align: center;
            font-size: 30px;
            font-family: cursive;
            font-weight: bolder;
            text-decoration: underline;
            color: black;
        }

        input{
            /*margin-top: 20px;*/
            background-color: wheat;
            color: black;
            display: block;
            margin: auto;
            width: 75%;
        }
        button{
            width: 250px;
            /*margin-top: 20px;*/
            margin: 20px auto;
            display: block;
            text-align: center;
            background-color: black;
            color: #f8f9fa;
        }
        button:hover{
            background-color: yellow;
            color: black;
        }
</style>

<body>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissable fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}
<h4>Login</h4>
<form action="" method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="mt-5"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Login</button>

    <p>Don't have an account?
        <a href="{% url 'sign_up' %}">Register Here</a>
    </p>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
