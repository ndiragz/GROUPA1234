<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pay With M-Pesa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>

<h4>MAKE PAYMENT</h4>

<form action="" method="POST">
    {% csrf_token %}
<input type="text" name="phone" placeholder="Enter Phone Number" class="form-control" required><br>
<input type="number" name="amount" placeholder="Enter Amount" class="form-control" required><br>
<button type="submit" class="btn btn-primary">Pay Now</button>
</form>
</body>
</html>
